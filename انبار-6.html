<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>انبار</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --char: #211d1a;
    --char-2: #2d2721;
    --cream: #f3ede2;
    --copper: #c1682f;
    --copper-dim: #8c4c24;
    --green: #4f8a5b;
    --green-glow: rgba(79,138,91,.35);
    --red: #b8493a;
    --red-glow: rgba(184,73,58,.35);
    --line: rgba(243,237,226,.1);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(193,104,47,.10), transparent 45%),
      var(--char);
    color: var(--cream);
    font-family: 'Vazirmatn', sans-serif;
    min-height: 100vh;
    padding: 20px 14px 60px;
  }
  .wrap{ max-width: 560px; margin: 0 auto; }

  header{
    display:flex; align-items:center; gap:12px;
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .skewer{
    width: 42px; height: 42px; flex-shrink:0;
  }
  header h1{
    font-size: 22px; font-weight: 900; margin:0;
    letter-spacing: .5px;
  }
  header p{
    margin: 2px 0 0; font-size: 12.5px; color: rgba(243,237,226,.55);
    font-weight: 500;
  }

  .stats{
    display:flex; gap:10px; margin-bottom:18px;
  }
  .stat{
    flex:1; background: var(--char-2); border:1px solid var(--line);
    border-radius: 12px; padding: 12px 14px;
  }
  .stat b{ display:block; font-size: 20px; font-weight:800; }
  .stat span{ font-size: 11.5px; color: rgba(243,237,226,.5); }
  .stat.ok b{ color: var(--green); }
  .stat.low b{ color: var(--red); }

  .add-box{
    background: var(--char-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 22px;
  }
  .add-box .row{ display:flex; flex-direction:column; gap:10px; }
  .add-box .row2{ display:flex; gap:8px; }
  .add-box input{
    width:100%;
    background: var(--char);
    border: 1px solid var(--line);
    color: var(--cream);
    border-radius: 10px;
    padding: 12px 12px;
    font-family: inherit;
    font-size: 16px;
    outline:none;
  }
  .add-box input:focus{ border-color: var(--copper); }
  .add-box input[name="qty"]{ flex: 1; min-width: 0; text-align:center; }
  .add-box button{
    flex: 1;
    background: var(--copper);
    color: var(--char);
    border:none; border-radius: 10px;
    padding: 0 18px;
    font-family: inherit; font-weight: 700; font-size: 15px;
    cursor:pointer;
  }
  .add-box button:active{ background: var(--copper-dim); }

  .empty{
    text-align:center; padding: 50px 20px; color: rgba(243,237,226,.4);
    font-size: 13.5px; line-height:1.9;
  }

  .item{
    display:flex; align-items:center; gap:12px;
    background: var(--char-2);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .dot{
    width: 14px; height: 14px; border-radius: 50%;
    flex-shrink:0;
    background: var(--red);
    box-shadow: 0 0 0 4px var(--red-glow);
  }
  .dot.ok{ background: var(--green); box-shadow: 0 0 0 4px var(--green-glow); }

  .item .info{ flex:1; min-width:0; }
  .item .info .name{ font-size: 14.5px; font-weight: 600; }
  .item .info .tag{ font-size: 11px; color: rgba(243,237,226,.45); margin-top:1px; }

  .qty-ctrl{ display:flex; align-items:center; gap:8px; }
  .qty-ctrl button{
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--char);
    color: var(--cream);
    font-size: 16px; font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    line-height:1;
  }
  .qty-ctrl button:active{ background: var(--copper-dim); }
  .qty-ctrl .num{
    min-width: 26px; text-align:center;
    font-weight: 800; font-size: 15px;
  }
  .del{
    background:none; border:none; color: rgba(243,237,226,.35);
    font-size: 17px; cursor:pointer; padding: 4px 2px;
    flex-shrink:0;
  }
  .del:active{ color: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="skewer" viewBox="0 0 48 48" fill="none">
      <line x1="8" y1="40" x2="40" y2="8" stroke="#c1682f" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="16" cy="32" r="5.5" fill="#8c4c24"/>
      <circle cx="24" cy="24" r="5.5" fill="#c1682f"/>
      <circle cx="32" cy="16" r="5.5" fill="#8c4c24"/>
    </svg>
    <div>
      <h1>انبار</h1>
      <p>موجودی وسایل مغازه</p>
    </div>
  </header>

  <div class="stats">
    <div class="stat ok"><b id="okCount">0</b><span>موجود</span></div>
    <div class="stat low"><b id="lowCount">0</b><span>کم / تمام</span></div>
    <div class="stat"><b id="totalCount">0</b><span>کل اقلام</span></div>
  </div>

  <div class="add-box">
    <div class="row">
      <input name="name" id="newName" type="text" placeholder="نام وسیله (مثلاً ظرف کباب)">
      <div class="row2">
        <input name="qty" id="newQty" type="number" placeholder="تعداد" value="0" min="0">
        <button id="addBtn">افزودن</button>
      </div>
    </div>
  </div>

  <div id="list"></div>
</div>

<script>
  const STORAGE_KEY = 'anbar-items-v1';
  const THRESHOLD = 3;

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function save(items){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  let items = load();

  function render(){
    const list = document.getElementById('list');
    list.innerHTML = '';

    if(items.length === 0){
      list.innerHTML = '<div class="empty">هنوز چیزی اضافه نکردی.<br>اسم وسیله رو بالا بنویس و بزن «افزودن».</div>';
    }

    items.forEach((item, idx) => {
      const ok = item.qty >= THRESHOLD;
      const row = document.createElement('div');
      row.className = 'item';
      row.innerHTML = `
        <div class="dot ${ok ? 'ok' : ''}"></div>
        <div class="info">
          <div class="name">${escapeHtml(item.name)}</div>
          <div class="tag">${ok ? 'موجودی کافی' : (item.qty === 0 ? 'تمام شده' : 'موجودی کم')}</div>
        </div>
        <div class="qty-ctrl">
          <button data-act="dec" data-idx="${idx}">−</button>
          <div class="num">${item.qty}</div>
          <button data-act="inc" data-idx="${idx}">+</button>
        </div>
        <button class="del" data-act="del" data-idx="${idx}">✕</button>
      `;
      list.appendChild(row);
    });

    document.getElementById('totalCount').textContent = items.length;
    document.getElementById('okCount').textContent = items.filter(i => i.qty >= THRESHOLD).length;
    document.getElementById('lowCount').textContent = items.filter(i => i.qty < THRESHOLD).length;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const nameInput = document.getElementById('newName');
    const qtyInput = document.getElementById('newQty');
    const name = nameInput.value.trim();
    let qty = parseInt(qtyInput.value, 10);
    if(isNaN(qty) || qty < 0) qty = 0;
    if(!name) { nameInput.focus(); return; }

    items.push({ name, qty });
    save(items);
    nameInput.value = '';
    qtyInput.value = '0';
    nameInput.focus();
    render();
  });

  document.getElementById('newName').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.getElementById('list').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;
    const act = btn.dataset.act;
    const idx = parseInt(btn.dataset.idx, 10);
    if(isNaN(idx)) return;

    if(act === 'inc'){ items[idx].qty += 1; }
    else if(act === 'dec'){ items[idx].qty = Math.max(0, items[idx].qty - 1); }
    else if(act === 'del'){ items.splice(idx, 1); }

    save(items);
    render();
  });

  render();
</script>
</body>
</html>
